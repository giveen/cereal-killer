services:
  app:
    build: .
    depends_on:
      - redis
      - searxng
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_INDEX: ${REDIS_INDEX:-ippsec_idx}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:8000/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen3.6}
      LLM_API_KEY: ${LLM_API_KEY:-not-needed}
      REASONING_PARSER: ${REASONING_PARSER:-qwen3}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN:-262144}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://searxng:8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ~/.zsh_history:/root/.zsh_history:ro
      - ~/.bash_history:/root/.bash_history:ro
      - ~/.local/share/fish/fish_history:/root/.local/share/fish/fish_history:ro
    tty: true
    stdin_open: true

  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"

  searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-change-me-in-production}
    volumes:
      - ./config/searxng:/etc/searxng:rw
    ports:
      - "18080:8080"
