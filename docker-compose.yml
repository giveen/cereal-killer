services:
  app:
    build:
      context: .
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    depends_on:
      - redis
      - searxng
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_INDEX: ${REDIS_INDEX:-ippsec_idx}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:8000/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen3.6}
      LLM_API_KEY: ${LLM_API_KEY:-not-needed}
      REASONING_PARSER: ${REASONING_PARSER:-qwen3}
      BACKEND_TRACE_ENABLED: ${BACKEND_TRACE_ENABLED:-1}
      BACKEND_TRACE_PATH: ${BACKEND_TRACE_PATH:-/app/logs/llm_backend.log}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN:-262144}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://searxng:8080}
      HISTORY_PATH: ${HISTORY_PATH:-/home/jabbatheduck/.zsh_history}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs
      - ~/.zsh_history:/home/appuser/.zsh_history:ro
      - ~/.bash_history:/home/appuser/.bash_history:ro
      - ~/.local/share/fish/fish_history:/home/appuser/.local/share/fish/fish_history:ro
      - ${SCREENSHOTS_DIR:-/tmp/screenshots}:/screenshots:ro
    tty: true
    stdin_open: true

  redis:
    image: redis/redis-stack:latest
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
      - "8001:8001"

  searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-change-me-in-production}
    volumes:
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml:ro
    ports:
      - "18080:8080"

volumes:
  redis_data:
    name: cereal-killer-redis-data
